services:
  portfolio-postgres-db:
    image: bitnami/postgresql:latest
    container_name: portfolio-postgres-db
    ports:
      - "${DATABASE_PORT}:5432"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRESQL_USERNAME=${DATABASE_USER}
      - POSTGRESQL_PASSWORD=${DATABASE_PASSWORD}
      - POSTGRESQL_DATABASE=portfolio
      - POSTGRESQL_TIMEZONE=America/Sao_Paulo
    volumes:
      - db_volume:/bitnami/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d portfolio -h 127.0.0.1 -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - local-network

  portfolio-pg-admin:
    image: dpage/pgadmin4:latest
    container_name: portfolio-pg-admin
    depends_on:
      - portfolio-postgres-db
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
      - TZ=America/Sao_Paulo
    ports:
      - "8082:80"
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - local-network

  firebase-emulator:
    image: spine3/firebase-emulator
    container_name: firebase-emulator
    environment:
      - GCP_PROJECT=${GCP_PROJECT}
      - ENABLE_UI=true
    ports:
      - "9000:9000"
      - "8080:8080"
      - "4000:4000"
      - "9099:9099"
      - "8085:8085"
      - "5001:5001"
      - "9199:9199"
    stdin_open: true
    tty: true
    command:
      [
        "/bin/sh",
        "-c",
        "/entrypoint.sh && firebase emulators:start --import=/firebase/baseline-data",
      ]
    volumes:
      - ./baseline-data:/firebase/baseline-data
      - ./entrypoint.sh:/entrypoint.sh
    restart: always
    networks:
      - local-network

  portfolio-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-app
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - GCP_PROJECT=${GCP_PROJECT}
      - FIREBASE_PROJECT_ID=${GCP_PROJECT}
      - FIREBASE_STORAGE_BUCKET=${GCP_PROJECT}.firebasestorage.app
      - FIREBASE_STORAGE_EMULATOR_HOST=firebase-emulator:9199
      - FIREBASE_STORAGE_EMULATOR_PUBLIC_HOST=localhost:9199
    volumes:
      - ./core:/app/core
      - ./database:/app/database
      - ./packages:/app/packages
      - ./web:/app/web
      - /app/node_modules
      - /app/core/node_modules
      - /app/database/node_modules
      - /app/packages/node_modules
      - /app/web/node_modules
    depends_on:
      portfolio-postgres-db:
        condition: service_healthy
      firebase-emulator:
        condition: service_started
    restart: unless-stopped
    networks:
      - local-network

volumes:
  db_volume:

networks:
  local-network:
    driver: bridge